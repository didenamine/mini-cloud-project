
services:

  app:
    #build: ./app
    image: ${DOCKER_APP_IMAGE}:${DOCKER_IMAGE_TAG}
    expose:
      - "5000"
    depends_on:
      - db
      - redis

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: tasks
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql

  redis:
    image: redis:latest
  nginx:
    #build: ./nginx
    image: ${DOCKER_NGINX_IMAGE}:${DOCKER_IMAGE_TAG}
    #image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    network_mode: host
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
volumes:
  db-data:
